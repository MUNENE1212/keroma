name: Deploy KEROMA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://keroma.ementech.co.ke
          KEROMA_AI_MOCK: 'true'
        run: npm run build

      - name: Sync to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: '.next/,public/,package.json,package-lock.json,next.config.ts,ecosystem.config.cjs,server.js'
          target: '${{ secrets.VPS_DEPLOY_PATH }}/'

      - name: Restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            npm ci --production
            pm2 restart keroma || pm2 start ecosystem.config.cjs
            pm2 save

      - name: Health check
        run: |
          sleep 8
          for i in 1 2 3 4 5; do
            if curl -fsS -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}:3005 | grep -q 200; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Retry $i..."
            sleep 5
          done
          echo "✗ Health check failed"
          exit 1